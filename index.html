<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a8edea);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        text-align: center;
        color: white;
        overflow: hidden;
        height: 100vh;
    }

    @keyframes gradient {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .container {
        position: relative;
        z-index: 10;
        max-width: 420px;
        margin: 40px auto;
        padding: 20px;
    }

    h1 {
        font-size: 2.8em;
        margin: 15px 0 5px;
        text-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    h2 {
        font-size: 1.6em;
        margin: 10px 0 30px;
        opacity: 0.95;
    }

    .cat-container {
        position: relative;
        width: 260px;
        margin: 20px auto;
        filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
    }

    .cat {
        width: 100%;
        border-radius: 30px;
        transition: transform 0.4s ease;
    }

    .cat:hover {
        transform: scale(1.08) rotate(3deg);
    }

    /* Анимация кота */
    @keyframes catBob {
        0%, 100% { transform: translateY(0) rotate(-5deg); }
        50% { transform: translateY(-25px) rotate(5deg); }
    }

    .cat-container {
        animation: catBob 3s ease-in-out infinite;
    }

    /* Сердечки */
    .heart {
        position: absolute;
        font-size: 30px;
        color: #ff4d6d;
        pointer-events: none;
        animation: floatHeart 4s linear forwards;
        z-index: 5;
        text-shadow: 0 0 8px rgba(255,77,109,0.8);
    }

    @keyframes floatHeart {
        0% { transform: translateY(0) scale(0.5); opacity: 1; }
        100% { transform: translateY(-600px) scale(1.2); opacity: 0; }
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 25px;
        margin-top: 30px;
        flex-wrap: wrap;
    }

    button {
        padding: 16px 35px;
        font-size: 1.3em;
        border-radius: 50px;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    #yes {
        background: linear-gradient(45deg, #ff4d6d, #ff6b8a);
        color: white;
    }

    #yes:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 30px rgba(255,77,109,0.4);
    }

    #no {
        background: #666;
        color: white;
        position: relative;
    }

    /* Второе подтверждение */
    .second-screen, .third-screen {
        display: none;
    }

    .picker {
        margin: 30px 0;
    }

    input {
        padding: 14px 20px;
        font-size: 1.1em;
        border-radius: 15px;
        border: none;
        margin: 12px 0;
        width: 85%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .message {
        font-size: 1.4em;
        margin: 30px 0;
        line-height: 1.4;
    }
</style>
</head>
<body>

<div class="container" id="main-screen">
    <h1>Привет, красотка 💖</h1>
    <h2>Пойдёшь со мной гулять? 🥺</h2>
    
    <div class="cat-container">
        <img src="cat.png" class="cat" id="cat-image">
    </div>

    <div class="buttons">
        <button id="yes" onclick="accept()">Дааа 😍</button>
        <button id="no" onmouseover="moveNoButton()">Нет 😅</button>
    </div>
</div>

<!-- Второй экран: Ты уверена? -->
<div class="container second-screen" id="second-screen">
    <h1>Ты уверена? 😔</h1>
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>
    <div class="message">Ну пожалуйста... 🥺</div>
    <div class="buttons">
        <button id="yes2" onclick="goToDatePicker()">Извини, да 😘</button>
        <button onclick="backToMain()">Нет, точно нет</button>
    </div>
</div>

<!-- Третий экран: Выбор даты -->
<div class="container third-screen" id="third-screen">
    <h1>Выбери дату и время 💕</h1>
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>
    
    <div class="picker">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
    </div>
    
    <button onclick="sendToTG()" style="background: linear-gradient(45deg, #ff4d6d, #ff6b8a); padding: 16px 40px; font-size: 1.3em;">
        Отправить ему 💌
    </button>
</div>

<script>
// Создаём летающие сердечки
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '💖';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    heart.style.opacity = Math.random() * 0.7 + 0.6;
    document.body.appendChild(heart);
    
    setTimeout(() => heart.remove(), 7000);
}

setInterval(createHeart, 300);

// Движение кнопки "Нет"
let noClickCount = 0;
const noBtn = document.getElementById('no');

function moveNoButton() {
    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 100;
    
    const newX = Math.random() * maxX;
    const newY = Math.random() * maxY;
    
    noBtn.style.position = 'absolute';
    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';
    
    noClickCount++;
    
    // Если очень упорно пытается нажать
    if (noClickCount > 6) {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('second-screen').style.display = 'block';
    }
}

// Клик по "Да" с первого экрана
function accept() {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('third-screen').style.display = 'block';
}

// Переход на выбор даты
function goToDatePicker() {
    document.getElementById('second-screen').style.display = 'none';
    document.getElementById('third-screen').style.display = 'block';
}

function backToMain() {
    document.getElementById('second-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    noClickCount = 0;
}

// Отправка в Telegram
function sendToTG() {
    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;
    
    if (!date || !time) {
        alert("Выбери дату и время ❤️");
        return;
    }
    
    const text = encodeURIComponent(`Я свободна ${date} в ${time} 💕 Хочу с тобой гулять!`);
    window.location.href = `https://t.me/bibirobdiller?text=${text}`;
}

// Устанавливаем минимальную дату = сегодня
window.onload = () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').min = today;
    
    // Дополнительная анимация кота при наведении
    const cat = document.getElementById('cat-image');
    cat.addEventListener('click', () => {
        cat.style.transform = 'scale(1.3) rotate(15deg)';
        setTimeout(() => cat.style.transform = '', 400);
    });
};
</script>
</body>
</html>
