<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебя 💖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a8edea);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            text-align: center;
            color: white;
            overflow: hidden;
            min-height: 100vh;
            touch-action: manipulation;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 420px;
            margin: 0 auto;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 2.4em;
            margin: 10px 0 8px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }

        h2 {
            font-size: 1.55em;
            margin: 10px 0 25px;
            line-height: 1.3;
        }

        .cat-container {
            width: 260px;
            margin: 20px auto;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
            animation: catBob 3.5s ease-in-out infinite;
        }

        @keyframes catBob {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-20px) rotate(4deg); }
        }

        .cat {
            width: 100%;
            border-radius: 25px;
        }

        /* Летающие сердечки */
        .heart {
            position: absolute;
            font-size: 28px;
            pointer-events: none;
            animation: floatHeart 4.5s linear forwards;
            z-index: 5;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100px) scale(0.6); opacity: 0.9; }
            100% { transform: translateY(-700px) scale(1.3); opacity: 0; }
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 30px;
        }

        button {
            padding: 18px 40px;
            font-size: 1.45em;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            min-height: 60px;
        }

        #yes {
            background: linear-gradient(45deg, #ff4d6d, #ff6b8a);
        }

        #yes:active {
            transform: scale(0.95);
        }

        #no {
            background: #555;
            position: relative;
        }

        /* Второй и третий экраны */
        .screen { display: none; }
        .active { display: flex !important; }

        input {
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            border-radius: 15px;
            border: none;
            margin: 12px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button.big {
            padding: 18px 50px;
            font-size: 1.4em;
        }
    </style>
</head>
<body>

<div class="container active" id="main-screen">
    <h1>Привет, красотка 💖</h1>
    <h2>Пойдёшь со мной гулять? 🥺</h2>
    
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>

    <div class="buttons">
        <button id="yes" onclick="accept()">Дааа 😍</button>
        <button id="no" onmouseover="moveNoButton()" ontouchstart="moveNoButton()">Нет 😅</button>
    </div>
</div>

<!-- Второй экран -->
<div class="container screen" id="second-screen">
    <h1>Ты уверена? 😔</h1>
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>
    <h2>Ну пожалуйста... 🥺</h2>
    <div class="buttons">
        <button onclick="goToDate()">Извини, да 😘</button>
        <button onclick="backToMain()">Нет, точно нет</button>
    </div>
</div>

<!-- Третий экран -->
<div class="container screen" id="third-screen">
    <h1>Выбери дату и время 💕</h1>
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>
    
    <input type="date" id="dateInput">
    <input type="time" id="timeInput">
    
    <button onclick="sendToTG()" class="big" style="background: linear-gradient(45deg, #ff4d6d, #ff6b8a); margin-top: 20px;">
        Отправить ему 💌
    </button>
</div>

<script>
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = ['💖','❤️','💗','💘'][Math.floor(Math.random()*4)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3.5) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 280);

// Движение кнопки "Нет"
function moveNoButton() {
    const btn = document.getElementById('no');
    const maxX = window.innerWidth - 160;
    const maxY = window.innerHeight - 180;
    
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    
    btn.style.position = 'absolute';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
}

// Переходы между экранами
function accept() {
    document.getElementById('main-screen').classList.remove('active');
    document.getElementById('third-screen').classList.add('active');
}

function goToDate() {
    document.getElementById('second-screen').classList.remove('active');
    document.getElementById('third-screen').classList.add('active');
}

function backToMain() {
    document.getElementById('second-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
}

function sendToTG() {
    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;
    
    if (!date || !time) {
        alert("Выбери дату и время ❤️");
        return;
    }
    
    const text = encodeURIComponent(`Я свободна ${date} в ${time} 💕 Хочу с тобой гулять!`);
    window.location.href = `https://t.me/bibirobdiller?text=${text}`;
}

// Инициализация
window.onload = () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').min = today;
};
</script>
</body>
</html>
