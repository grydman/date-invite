<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебя 💖</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a8edea);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            text-align: center;
            color: white;
            overflow: hidden;
            min-height: 100vh;
            touch-action: manipulation;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 420px;
            margin: 0 auto;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 { font-size: 2.3em; margin: 10px 0 8px; }
        h2 { font-size: 1.5em; margin: 10px 0 30px; line-height: 1.3; }

        .cat-container {
            width: 260px;
            margin: 25px auto;
            animation: catBob 3.5s ease-in-out infinite;
        }

        @keyframes catBob {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-20px) rotate(4deg); }
        }

        .cat { width: 100%; border-radius: 25px; }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 30px;
            position: relative;
            min-height: 180px;
            z-index: 20;
        }

        button {
            padding: 22px 40px;
            font-size: 1.55em;
            border-radius: 50px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            min-height: 78px;
            touch-action: manipulation;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #yesBtn { background: linear-gradient(45deg, #ff4d6d, #ff6b8a); }
        #noBtn { background: #555; }

        .screen { display: none; }
        .active { display: flex !important; flex-direction: column; }
    </style>
</head>
<body>

<div class="container active" id="main-screen">
    <h1>Привет, красотка 💖</h1>
    <h2>Пойдёшь со мной гулять? 🥺</h2>
    
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>

    <div class="buttons">
        <button id="yesBtn">Дааа 😍</button>
        <button id="noBtn">Нет 😅</button>
    </div>
</div>

<!-- Второй экран -->
<div class="container screen" id="second-screen">
    <h1>Ты уверена? 😔</h1>
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>
    <h2>Ну пожалуйста... 🥺</h2>
    <div class="buttons">
        <button onclick="goToDate()">Извини, да 😘</button>
        <button onclick="backToMain()">Нет, точно нет</button>
    </div>
</div>

<!-- Третий экран -->
<div class="container screen" id="third-screen">
    <h1>Выбери дату и время 💕</h1>
    <div class="cat-container">
        <img src="cat.png" class="cat">
    </div>
    
    <input type="date" id="dateInput" style="padding:16px; font-size:1.1em; width:100%; margin:12px 0; border-radius:15px;">
    <input type="time" id="timeInput" style="padding:16px; font-size:1.1em; width:100%; margin:12px 0; border-radius:15px;">
    
    <button onclick="sendToTG()" style="background: linear-gradient(45deg, #ff4d6d, #ff6b8a); padding: 22px 50px; font-size: 1.5em; margin-top: 25px;">
        Отправить ему 💌
    </button>
</div>

<script>
// Главные кнопки
document.getElementById('yesBtn').addEventListener('click', accept);
document.getElementById('yesBtn').addEventListener('touchend', function(e){
    e.preventDefault();
    accept();
});

document.getElementById('noBtn').addEventListener('click', moveNoButton);
document.getElementById('noBtn').addEventListener('touchstart', function(e){
    e.preventDefault();
    moveNoButton();
});

let noClickCount = 0;

function moveNoButton() {
    noClickCount++;
    
    const btn = document.getElementById('noBtn');
    const container = document.querySelector('.buttons');
    
    const maxX = container.offsetWidth - btn.offsetWidth - 30;
    const maxY = container.offsetHeight - btn.offsetHeight - 40;
    
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    
    btn.style.position = 'absolute';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';

    if (noClickCount >= 5) {
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('second-screen').classList.add('active');
    }
}

function accept() {
    document.getElementById('main-screen').classList.remove('active');
    document.getElementById('third-screen').classList.add('active');
}

function goToDate() {
    document.getElementById('second-screen').classList.remove('active');
    document.getElementById('third-screen').classList.add('active');
}

function backToMain() {
    document.getElementById('second-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
    noClickCount = 0;
}

function sendToTG() {
    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;
    if (!date || !time) {
        alert("Выбери дату и время ❤️");
        return;
    }
    const text = encodeURIComponent(`Я свободна ${date} в ${time} 💕 Хочу с тобой гулять!`);
    window.location.href = `https://t.me/bibirobdiller?text=${text}`;
}

// Сердечки
function createHeart() {
    const heart = document.createElement('div');
    heart.style.position = 'absolute';
    heart.style.fontSize = '30px';
    heart.style.left = Math.random() * 95 + 'vw';
    heart.style.top = '50vh';
    heart.style.animation = 'floatHeart 5s linear forwards';
    heart.innerHTML = '💖';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 350);

// Инициализация
window.onload = () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').min = today;
};
</script>

<style>
@keyframes floatHeart {
    0% { transform: translateY(100px) scale(0.6); opacity: 0.9; }
    100% { transform: translateY(-800px) scale(1.4); opacity: 0; }
}
</style>
</body>
</html>
